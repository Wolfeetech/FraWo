name: repo-hygiene

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  docs-and-security:
    name: Docs And Security Hygiene
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify canonical SSOT files exist
        run: |
          set -euo pipefail
          required=(
            README.md
            AGENTS.md
            OPS_HOME.md
            LIVE_CONTEXT.md
            MASTERPLAN.md
            todo.md
            AI_OPERATING_MODEL.md
            COMMUNICATION/agent_board.md
            manifests/workspaces/canonical_workspace.json
            manifests/work_lanes/current_plan.json
            SSOT/START_HERE.md
          )

          missing=0
          for file in "${required[@]}"; do
            if [ -f "$file" ]; then
              echo "OK: $file"
            else
              echo "MISSING: $file"
              missing=$((missing + 1))
            fi
          done

          if [ "$missing" -gt 0 ]; then
            echo "$missing required file(s) missing."
            exit 1
          fi

      - name: Verify private OpenClaw key is not tracked
        run: |
          set -euo pipefail
          if git ls-files 'Codex/openclaw_id_ed25519*' | grep -q .; then
            echo "ERROR: OpenClaw key material is tracked."
            git ls-files 'Codex/openclaw_id_ed25519*'
            exit 1
          fi
          echo "OK: OpenClaw key material is not tracked."

      - name: Scan for obvious private key material
        run: |
          set -euo pipefail
          if git grep -n \
            -e "BEGIN OPENSSH PRIVATE KEY" \
            -e "BEGIN RSA PRIVATE KEY" \
            -e "BEGIN PRIVATE KEY" \
            -- . ':!.github/workflows/repo-hygiene.yml'; then
            echo "ERROR: Private key material found in tracked files."
            exit 1
          fi
          echo "OK: no tracked private key blocks found."

      - name: Validate JSON manifests
        run: |
          set -euo pipefail
          python -m json.tool manifests/workspaces/canonical_workspace.json >/dev/null
          python -m json.tool manifests/work_lanes/current_plan.json >/dev/null
          echo "OK: JSON manifests parse."

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint -d '{extends: relaxed, rules: {line-length: {max: 200}}}' \
            --ignore _logs/ \
            .github/workflows/ \
            ansible/playbooks/ \
            ansible/inventory/ || true

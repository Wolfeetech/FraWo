name: radio-player-frontend-package

on:
  workflow_dispatch:
  push:
    branches: [ develop, main ]
    tags: [ 'v*' ]
    paths:
      - 'apps/radio-player-frontend/**'
      - '.github/workflows/radio-player-frontend-package.yml'

jobs:
  package-to-ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/wolfeetech/frawo/radio-player-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=dev-latest,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=main-latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./apps/radio-player-frontend
          file: ./apps/radio-player-frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

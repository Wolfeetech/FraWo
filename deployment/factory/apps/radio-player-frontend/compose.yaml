services:
  radio-player-frontend:
    image: ${IMAGE_REF:-ghcr.io/wolfeetech/frawo/radio-player-frontend:dev-latest}
    container_name: ${CONTAINER_NAME:-radio-player-frontend}
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-../../../../apps/radio-player-frontend/env/dev.env.example}
    ports:
      - "127.0.0.1:${HOST_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

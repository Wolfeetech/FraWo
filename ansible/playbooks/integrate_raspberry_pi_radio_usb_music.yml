---
- name: Integrate Raspberry Pi network-backed music source into AzuraCast
  hosts: raspberry_pi_radio
  become: true

  vars:
    rpi_radio_station_media_path: "/var/azuracast/stations/{{ rpi_radio_station_shortcode }}/media"
    rpi_radio_network_source_path: "{{ rpi_radio_media_mountpoint }}/{{ rpi_radio_media_subdir }}"
    rpi_radio_media_share_password: "{{ homeserver_vault_storage_share_password | default(lookup('env', 'HOMESERVER_STORAGE_SHARE_PASSWORD') | default('', true)) }}"

  pre_tasks:
    - name: Assert SMB share password is provided
      ansible.builtin.assert:
        that:
          - rpi_radio_media_share_password | length > 0
        fail_msg: "Set HOMESERVER_STORAGE_SHARE_PASSWORD or homeserver_vault_storage_share_password before mounting the SMB media share."

  tasks:
    - name: Ensure SMB credential directory exists
      ansible.builtin.file:
        path: "{{ rpi_radio_media_credentials_file | dirname }}"
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Install SMB credentials for storage-node media share
      ansible.builtin.copy:
        dest: "{{ rpi_radio_media_credentials_file }}"
        owner: root
        group: root
        mode: "0600"
        content: |
          username=radio
          password={{ rpi_radio_media_share_password }}
      no_log: true
      register: rpi_radio_media_credentials

    - name: Ensure SMB media mountpoint exists
      ansible.builtin.file:
        path: "{{ rpi_radio_media_mountpoint }}"
        state: directory
        owner: "{{ rpi_radio_admin_user }}"
        group: "{{ rpi_radio_admin_user }}"
        mode: "0770"

    - name: Mount SMB media source for AzuraCast-managed media access
      ansible.posix.mount:
        path: "{{ rpi_radio_media_mountpoint }}"
        src: "{{ rpi_radio_media_share }}"
        fstype: cifs
        opts: "{{ rpi_radio_media_mount_opts }}"
        state: mounted
      register: rpi_radio_media_mount

    - name: Assert expected network media subdirectory exists
      ansible.builtin.stat:
        path: "{{ rpi_radio_network_source_path }}"
      register: rpi_radio_network_source_stat

    - name: Fail if expected network media path is missing
      ansible.builtin.assert:
        that:
          - rpi_radio_network_source_stat.stat.exists
          - rpi_radio_network_source_stat.stat.isdir
        fail_msg: "Expected network media path {{ rpi_radio_network_source_path }} is missing."

    - name: Install AzuraCast override for SMB media bind
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/radio/azuracast-docker-compose.override.yml.j2"
        dest: /var/azuracast/docker-compose.override.yml
        owner: root
        group: root
        mode: "0644"
      register: rpi_radio_override

    - name: Recreate AzuraCast with SMB media override
      ansible.builtin.command:
        cmd: docker compose up -d
      args:
        chdir: /var/azuracast
      when: rpi_radio_media_mount.changed or rpi_radio_override.changed or rpi_radio_media_credentials.changed

    - name: Wait for AzuraCast web UI after SMB media integration
      ansible.builtin.uri:
        url: http://127.0.0.1/
        method: GET
        status_code: [200, 302]
      register: rpi_radio_azuracast_http
      retries: 30
      delay: 5
      until: rpi_radio_azuracast_http.status in [200, 302]

    - name: Count files visible inside station media path
      ansible.builtin.command:
        cmd: "docker exec azuracast sh -lc 'find {{ rpi_radio_station_media_path | quote }} -type f | wc -l'"
      register: rpi_radio_media_file_count
      changed_when: false

    - name: Assert music files are visible inside AzuraCast container
      ansible.builtin.assert:
        that:
          - (rpi_radio_media_file_count.stdout | trim | int) > 0
        fail_msg: "No music files are visible inside {{ rpi_radio_station_media_path }} after SMB integration."

    - name: Trigger AzuraCast sync after SMB media integration
      ansible.builtin.command:
        cmd: docker exec azuracast azuracast_cli azuracast:sync:run
      changed_when: true

    - name: Resolve station ID for frawo-funk
      ansible.builtin.command:
        cmd: >-
          docker exec azuracast azuracast_cli dbal:run-sql --force-fetch
          "SELECT id FROM station WHERE shortcode = '{{ rpi_radio_station_shortcode }}' LIMIT 1;"
      register: rpi_radio_station_id_query
      changed_when: false

    - name: Extract station ID from SQL output
      ansible.builtin.set_fact:
        rpi_radio_station_id: "{{ rpi_radio_station_id_query.stdout_lines | select('match', '^[[:space:]]*[0-9]+[[:space:]]*$') | map('trim') | first }}"

    - name: Assert station ID was resolved
      ansible.builtin.assert:
        that:
          - rpi_radio_station_id | length > 0
        fail_msg: "Unable to resolve station ID for shortcode {{ rpi_radio_station_shortcode }}."

    - name: Resolve default playlist ID for station
      ansible.builtin.command:
        cmd: >-
          docker exec azuracast azuracast_cli dbal:run-sql --force-fetch
          "SELECT sp.id FROM station_playlist sp WHERE sp.station_id = {{ rpi_radio_station_id }} ORDER BY sp.id LIMIT 1;"
      register: rpi_radio_playlist_id_query
      changed_when: false

    - name: Extract playlist ID from SQL output
      ansible.builtin.set_fact:
        rpi_radio_default_playlist_id: "{{ rpi_radio_playlist_id_query.stdout_lines | select('match', '^[[:space:]]*[0-9]+[[:space:]]*$') | map('trim') | first }}"

    - name: Assert playlist ID was resolved
      ansible.builtin.assert:
        that:
          - rpi_radio_default_playlist_id | length > 0
        fail_msg: "Unable to resolve a playlist ID for station {{ rpi_radio_station_shortcode }}."

    - name: Count station media records after SMB media sync
      ansible.builtin.command:
        cmd: >-
          docker exec azuracast azuracast_cli dbal:run-sql --force-fetch
          "SELECT COUNT(*) AS media_count FROM station_media sm WHERE sm.station_id = {{ rpi_radio_station_id }};"
      register: rpi_radio_station_media_count
      changed_when: false

    - name: Associate imported media with default station playlist
      ansible.builtin.command:
        cmd: >-
          docker exec azuracast azuracast_cli dbal:run-sql
          "INSERT INTO station_playlist_media (playlist_id, media_id, weight, last_played, is_queued, folder_id)
          SELECT {{ rpi_radio_default_playlist_id }}, sm.id, sm.id, 0, 0, NULL
          FROM station_media sm
          LEFT JOIN station_playlist_media spm
            ON spm.playlist_id = {{ rpi_radio_default_playlist_id }} AND spm.media_id = sm.id
          WHERE sm.station_id = {{ rpi_radio_station_id }} AND spm.id IS NULL;"
      changed_when: true

    - name: Restart AzuraCast radio services after playlist association
      ansible.builtin.command:
        cmd: docker exec azuracast azuracast_cli azuracast:radio:restart "{{ rpi_radio_station_id }}"
      changed_when: true

    - name: Wait for station nowplaying endpoint after radio restart
      ansible.builtin.command:
        cmd: >-
          docker exec azuracast sh -lc
          "curl -s http://127.0.0.1/api/nowplaying | jq -r '.[0].station.shortcode'"
      register: rpi_radio_nowplaying_check
      changed_when: false
      retries: 20
      delay: 5
      until: (rpi_radio_nowplaying_check.stdout | trim) == rpi_radio_station_shortcode

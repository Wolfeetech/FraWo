# ansible.cfg – Project-level Ansible configuration
# ---------------------------------------------------------------------------
[defaults]
inventory          = inventory/hosts.yml
roles_path         = roles
remote_user        = debian
private_key_file   = ~/.ssh/homeserver_2027_ed25519
host_key_checking  = True
retry_files_enabled = False
stdout_callback    = yaml
vault_password_file = ~/.ansible_vault_pass   # never commit this file

[privilege_escalation]
become      = True
become_method = sudo
become_user = root

[ssh_connection]
pipelining  = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r

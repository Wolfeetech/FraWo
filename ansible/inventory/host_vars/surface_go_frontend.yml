---
ansible_become_password: "{{ homeserver_vault_surface_frawo_password }}"
surface_go_target_hostname: surface-go-frontend
surface_go_admin_user: frawo
surface_go_kiosk_user: frontend
surface_go_portal_dir: /home/frontend/homeserver2027-portal
surface_go_portal_bind_address: 127.0.0.1
surface_go_portal_http_port: 17827
surface_go_kiosk_start_url: http://127.0.0.1:17827
surface_go_browser_binary: /usr/bin/firefox
surface_go_launcher_script: /usr/local/bin/homeserver2027-frawo-control
surface_go_odoo_admin_url: http://odoo.hs27.internal/web/login
surface_go_firefox_package: firefox
surface_go_text_scaling_factor: 1.25
surface_go_enable_screen_keyboard: true
surface_go_enable_toolkit_accessibility: true
surface_go_idle_delay_seconds: 0
surface_go_sleep_inactive_ac_type: nothing
surface_go_sleep_inactive_battery_type: nothing
surface_go_tailscale_repo_key_url: https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg
surface_go_tailscale_repo_list_url: https://pkgs.tailscale.com/stable/ubuntu/noble.tailscale-keyring.list
surface_go_required_packages:
  - openssh-server
  - curl
  - ca-certificates
  - unattended-upgrades
  - gdm3
  - gnome-kiosk
  - gnome-kiosk-script-session
  - firefox
  - dconf-cli
surface_go_keyboard_launcher_script: /usr/local/bin/homeserver2027-touch-keyboard
surface_go_absent_packages:
  - nginx
  - nginx-common
  - nginx-core
  - nginx-full
  - nginx-light
surface_go_portal_links:
  - label: Home Assistant
    group: Betrieb
    hint: Automationen, Geräte und Haushalts-Dashboards
    url: http://ha.hs27.internal
  - label: Nextcloud
    group: Arbeit
    hint: Dateien und Zusammenarbeit (Hauptmenü)
    url: http://cloud.hs27.internal/login
  - label: Nextcloud (Eingang)
    group: Dokumente
    hint: Scans und PDFs hier hochladen für automatisches Archiv
    url: http://cloud.hs27.internal/apps/files/?dir=/Paperless/Eingang
  - label: Paperless (Archiv)
    group: Dokumente
    hint: Zugriff auf die im Archiv gespeicherten PDF-Originale
    url: http://cloud.hs27.internal/apps/files/?dir=/Paperless/Archiv
  - label: Dokumenten-Suche
    group: Dokumente
    hint: Paperless-Volltextsuche und OCR-Archiv
    url: http://paperless.hs27.internal/accounts/login/
  - label: Media
    group: Medien
    hint: Jellyfin für Filme, Serien und Musik
    url: http://media.hs27.internal
  - label: Radio Player
    group: Medien
    hint: Touch-optimierte Ansicht für den Live-Sender
    url: http://radio.hs27.internal/public/frawo-funk
  - label: Radio Control
    group: Medien
    hint: AzuraCast Sender- und Playlist-Steuerung
    url: http://radio.hs27.internal/login
  - label: Odoo
    group: Arbeit
    hint: ERP und Business-Login
    url: http://odoo.hs27.internal/web/login

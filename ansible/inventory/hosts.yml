---
# ansible/inventory/hosts.yml
# ---------------------------------------------------------------------------
# Static inventory – no passwords stored here (MASTERPLAN §7).
# All sensitive values are in ansible/group_vars/vault_all.yml (ansible-vault).
# ---------------------------------------------------------------------------

all:
  vars:
    ansible_python_interpreter: /usr/bin/python3

  children:
    proxmox_nodes:
      hosts:
        pve-01:
          ansible_host: 10.0.0.11
        pve-02:
          ansible_host: 10.0.0.12

    vms:
      hosts:
        vm-201-vaultwarden:
          ansible_host: 10.50.0.201
        vm-202-nextcloud:
          ansible_host: 10.50.0.202
        vm-203-wireguard:
          ansible_host: 10.50.0.203
        vm-204-pbs:
          ansible_host: 10.0.0.204
        vm-205-monitoring:
          ansible_host: 10.0.0.205

    lxc:
      hosts:
        ct-101-npmgr:
          ansible_host: 10.30.0.101
        ct-102-adguard:
          ansible_host: 10.0.0.102
        ct-103-homeassistant:
          ansible_host: 10.20.0.103

    # Groups for role targeting
    webservers:
      hosts:
        ct-101-npmgr:
        vm-202-nextcloud:

    dns_servers:
      hosts:
        ct-102-adguard:

    vpn_gateways:
      hosts:
        vm-203-wireguard:

    backup_servers:
      hosts:
        vm-204-pbs:

    monitoring_servers:
      hosts:
        vm-205-monitoring:

---
# roles/proxmox_node/tasks/repos.yml
# Configure the free (no-subscription) Proxmox repository and disable the
# enterprise repository to prevent APT errors on non-subscribed nodes.

- name: Disable Proxmox enterprise repository
  ansible.builtin.replace:
    path: /etc/apt/sources.list.d/pve-enterprise.list
    regexp: '^(deb .*)'
    replace: '# \1'
  when: proxmox_disable_enterprise_repo | bool
  ignore_errors: true

- name: Disable Proxmox Ceph enterprise repository
  ansible.builtin.replace:
    path: /etc/apt/sources.list.d/ceph.list
    regexp: '^(deb .*)'
    replace: '# \1'
  when: proxmox_disable_enterprise_repo | bool
  ignore_errors: true

- name: Add Proxmox no-subscription repository
  ansible.builtin.apt_repository:
    repo: "deb http://download.proxmox.com/debian/pve {{ ansible_distribution_release }} pve-no-subscription"
    state: present
    filename: pve-no-subscription
  when: proxmox_no_subscription_repo | bool
  notify: Update apt cache

---
# roles/common/handlers/main.yml

- name: Restart sshd
  ansible.builtin.systemd:
    name: sshd
    state: restarted

- name: Reload nftables
  ansible.builtin.systemd:
    name: nftables
    state: reloaded

- name: Restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted

- name: Restart chrony
  ansible.builtin.systemd:
    name: chronyd
    state: restarted

- name: Reboot if required
  ansible.builtin.reboot:
    reboot_timeout: 300
  when: ansible_facts.get('reboot_required', false)

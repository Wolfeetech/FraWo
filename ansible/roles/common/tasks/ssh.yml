---
# roles/common/tasks/ssh.yml
# MASTERPLAN §7: password auth disabled, root login disabled, ED25519 only.

- name: Harden SSH daemon configuration
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    validate: "/usr/sbin/sshd -t -f %s"
    backup: true
  loop:
    - { regexp: '^#?PermitRootLogin',        line: 'PermitRootLogin {{ ssh_permit_root_login }}' }
    - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication {{ ssh_password_authentication }}' }
    - { regexp: '^#?PubkeyAuthentication',   line: 'PubkeyAuthentication {{ ssh_pubkey_authentication }}' }
    - { regexp: '^#?Port ',                  line: 'Port {{ ssh_port }}' }
    - { regexp: '^#?X11Forwarding',          line: 'X11Forwarding no' }
    - { regexp: '^#?AllowAgentForwarding',   line: 'AllowAgentForwarding no' }
    - { regexp: '^#?MaxAuthTries',           line: 'MaxAuthTries 3' }
    - { regexp: '^#?LoginGraceTime',         line: 'LoginGraceTime 30' }
  notify: Restart sshd

---
# roles/common/tasks/ntp.yml

- name: Ensure chrony is enabled and started
  ansible.builtin.systemd:
    name: chronyd
    enabled: true
    state: started

- name: Configure NTP servers
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart chrony

---
# roles/common/tasks/firewall.yml
# MASTERPLAN §7: nftables, default-deny inbound/forward.

- name: Ensure nftables is enabled and started
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started

- name: Deploy nftables ruleset from template
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0640"
    validate: "/usr/sbin/nft -c -f %s"
  notify: Reload nftables

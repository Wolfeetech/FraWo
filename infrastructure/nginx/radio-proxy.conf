server {
    listen 80;
    server_name radio.yourparty.tech;
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name radio.yourparty.tech;

    ssl_certificate /etc/letsencrypt/live/radio.yourparty.tech/fullchain.pem; # Managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/radio.yourparty.tech/privkey.pem; # Managed by Certbot

    # Standard Proxy to WordPress
    location / {
        proxy_pass http://192.168.178.207:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Internal API Proxy (AzuraCast / Backend)
    # Forwarding /ws/ to the internal AzuraCast WebSocket or Backend
    location /ws/ {
        proxy_pass http://192.168.178.211:8000/ws/; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    
    # Also proxy api stats if needed
    location /api/ {
         proxy_pass http://192.168.178.210:80/api/;
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header X-Forwarded-Proto https;
    }
}

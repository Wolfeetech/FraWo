<!-- FraWo Funk Radio Player — Sticky Footer -->

<style>
.fw-radio-player {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #000;
  border-top: 1px solid var(--fw-border, #1a1a1a);
  padding: 1rem 0;
  z-index: 9999;
  font-family: 'Inter', sans-serif;
}

.fw-radio-player-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 2rem;
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  gap: 2rem;
  align-items: center;
}

.fw-radio-station {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: #888;
  font-weight: 500;
}

.fw-radio-status {
  font-size: 0.8rem;
  color: #555;
}

.fw-radio-status.live {
  color: #a855f7;
}

.fw-radio-status.live:before {
  content: "●";
  margin-right: 0.5rem;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.fw-radio-controls {
  display: flex;
  gap: 1rem;
  align-items: center;
}

.fw-radio-btn {
  background: transparent;
  border: 1px solid #1a1a1a;
  color: #888;
  padding: 0.5rem 1rem;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s ease;
  font-weight: 500;
}

.fw-radio-btn:hover {
  border-color: #888;
  color: #e0e0e0;
}

.fw-radio-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.fw-radio-volume {
  width: 80px;
  height: 2px;
  background: #1a1a1a;
  position: relative;
  cursor: pointer;
}

.fw-radio-volume-fill {
  height: 100%;
  background: #888;
  width: 70%;
  transition: width 0.1s ease;
}

.fw-radio-close {
  background: none;
  border: none;
  color: #555;
  font-size: 1.2rem;
  cursor: pointer;
  padding: 0.5rem;
  line-height: 1;
  transition: color 0.2s ease;
}

.fw-radio-close:hover {
  color: #888;
}

@media (max-width: 768px) {
  .fw-radio-player-inner {
    grid-template-columns: 1fr;
    gap: 1rem;
  }

  .fw-radio-controls {
    justify-content: center;
  }
}
</style>

<div class="fw-radio-player" id="frawo-radio-player" style="display: none;">
  <div class="fw-radio-player-inner">
    <div class="fw-radio-station">FraWo Funk</div>

    <div class="fw-radio-status" id="radio-status">
      Coming Soon
    </div>

    <div class="fw-radio-controls">
      <button class="fw-radio-btn" id="radio-play-btn" disabled>Play</button>
      <button class="fw-radio-btn" id="radio-pause-btn" disabled style="display: none;">Pause</button>

      <div class="fw-radio-volume" id="radio-volume">
        <div class="fw-radio-volume-fill" id="radio-volume-fill"></div>
      </div>
    </div>

    <button class="fw-radio-close" id="radio-close-btn">&times;</button>
  </div>
</div>

<script>
(function() {
  // Radio Player State
  const player = {
    element: document.getElementById('frawo-radio-player'),
    audio: null,
    streamUrl: '/radio/listen/frawo_funk/radio.mp3', // AzuraCast stream
    isPlaying: false,
    volume: 0.7,
    isAvailable: false // Set to true when AzuraCast is ready
  };

  // Show player on page load
  if (player.element) {
    player.element.style.display = 'block';
  }

  // Initialize Audio (when enabled)
  function initAudio() {
    if (!player.audio) {
      player.audio = new Audio(player.streamUrl);
      player.audio.volume = player.volume;
    }
  }

  // Play/Pause Controls
  const playBtn = document.getElementById('radio-play-btn');
  const pauseBtn = document.getElementById('radio-pause-btn');

  if (playBtn) {
    playBtn.addEventListener('click', function() {
      if (!player.isAvailable) return;

      initAudio();
      player.audio.play();
      player.isPlaying = true;
      playBtn.style.display = 'none';
      pauseBtn.style.display = 'inline-block';
      updateStatus('live');
    });
  }

  if (pauseBtn) {
    pauseBtn.addEventListener('click', function() {
      if (player.audio) {
        player.audio.pause();
        player.isPlaying = false;
        pauseBtn.style.display = 'none';
        playBtn.style.display = 'inline-block';
        updateStatus('paused');
      }
    });
  }

  // Volume Control
  const volumeBar = document.getElementById('radio-volume');
  const volumeFill = document.getElementById('radio-volume-fill');

  if (volumeBar) {
    volumeBar.addEventListener('click', function(e) {
      if (!player.isAvailable) return;

      const rect = volumeBar.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const width = rect.width;
      const volume = Math.max(0, Math.min(1, x / width));

      player.volume = volume;
      volumeFill.style.width = (volume * 100) + '%';

      if (player.audio) {
        player.audio.volume = volume;
      }
    });
  }

  // Close Button
  const closeBtn = document.getElementById('radio-close-btn');
  if (closeBtn) {
    closeBtn.addEventListener('click', function() {
      if (player.audio) {
        player.audio.pause();
      }
      player.element.style.display = 'none';
      // Save state to localStorage
      localStorage.setItem('frawo-radio-closed', 'true');
    });
  }

  // Status Update
  function updateStatus(status) {
    const statusEl = document.getElementById('radio-status');
    if (!statusEl) return;

    if (status === 'live') {
      statusEl.textContent = 'Live';
      statusEl.classList.add('live');
    } else if (status === 'paused') {
      statusEl.textContent = 'Paused';
      statusEl.classList.remove('live');
    } else {
      statusEl.textContent = 'Coming Soon';
      statusEl.classList.remove('live');
    }
  }

  // Check if player was previously closed
  if (localStorage.getItem('frawo-radio-closed') === 'true') {
    player.element.style.display = 'none';
  }

  // TODO: Enable when AzuraCast is ready
  // player.isAvailable = true;
  // playBtn.disabled = false;
  // pauseBtn.disabled = false;
})();
</script>

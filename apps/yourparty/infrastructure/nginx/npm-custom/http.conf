# Security Headers - Included by NPM for all proxy hosts
# Place this file at /data/nginx/custom/http.conf

# SSL Settings for A+ Rating
ssl_protocols TLSv1.2 TLSv1.3;
ssl_session_timeout 1d;
ssl_session_cache shared:SSL:50m;
ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
ssl_prefer_server_ciphers off;

# Static Asset Caching Map (applied via server_proxy.conf)
map $request_uri $cache_control {
    default                        "no-cache";
    ~*\.(css|js|woff2?|ttf|svg)$  "public, max-age=604800, stale-while-revalidate=86400";
    ~*\.(jpg|jpeg|png|gif|ico|webp)$ "public, max-age=2592000, immutable";
}
